name: phoneapp
description: "gsmnode console — mobile mirror of the Web App."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  google_fonts: ^8.1.0
  # AES-256-GCM + PBKDF2 for end-to-end encryption (matches the Web App scheme).
  cryptography: ^2.7.0
  # Picking MMS attachments off the phone, standing in for the Web App's file
  # input. Media-only rather than any-file: that is what a carrier will actually
  # carry, and the generic pickers currently on pub can't build against AGP 9.
  image_picker: ^1.1.2
  # Locale-aware timestamps, standing in for the Web App's toLocaleString().
  intl: ^0.19.0
  # Face / fingerprint app lock. Android's BiometricPrompt, which also offers the
  # screen lock (PIN, pattern, password) as its own fallback. Pinned to the same
  # major as the Phone Agent's — the two surfaces share this feature's code
  # almost line for line, and 3.x reshapes the API (LocalAuthException in place
  # of error_codes.dart, no AuthenticationOptions), so they move together or not
  # at all.
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App launcher icons — the design system's *dark* app icon, where the Phone
# Agent takes the green one. The two install side by side on one phone, so they
# have to be tellable apart on the launcher; ink vs signal-green does that
# without either surface leaving the brand.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#12161C"
  adaptive_icon_foreground: "assets/icon/adaptive-foreground.png"
